<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balance Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(180deg, #5C7CFA 0%, #4263EB 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            position: relative;
        }

        .page-header h1 {
            font-size: 1.5rem;
            margin: 0;
            text-align: center;
            font-weight: 600;
        }

        .back-btn {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
        }

        .back-btn:hover {
            opacity: 0.8;
        }

        .content-wrapper {
            padding: 0 15px 30px 15px;
        }

        .tabs-container {
            background: white;
            border-radius: 15px 15px 0 0;
            margin-top: 20px;
            padding: 15px 0 0 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .nav-tabs {
            border: none;
            justify-content: space-around;
            padding: 0 20px;
        }

        .nav-tabs .nav-link {
            border: none;
            color: #999;
            font-size: 1.05rem;
            padding: 10px 20px;
            font-weight: 600;
            background: transparent;
        }

        .nav-tabs .nav-link.active {
            color: #667eea;
            background: transparent;
            border-bottom: 3px solid #667eea;
        }

        .transaction-list {
            background: white;
            border-radius: 0 0 15px 15px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .transaction-item {
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .transaction-left {
            flex: 1;
        }

        .transaction-type {
            font-size: 1.05rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 4px;
            text-transform: capitalize;
        }

        .transaction-date {
            font-size: 0.82rem;
            color: #aaa;
            margin-bottom: 6px;
        }

        /* ── Status badges ─────────────────────────────────── */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 0.3px;
        }

        .status-badge.pending {
            background: #FFF8E1;
            color: #F59E0B;
            border: 1px solid #FDE68A;
        }

        .status-badge.processing {
            background: #EFF6FF;
            color: #3B82F6;
            border: 1px solid #BFDBFE;
        }

        .status-badge.completed {
            background: #F0FDF4;
            color: #22C55E;
            border: 1px solid #BBF7D0;
        }

        .status-badge.failed,
        .status-badge.rejected {
            background: #FFF1F2;
            color: #EF4444;
            border: 1px solid #FECDD3;
        }

        .status-badge.cancelled {
            background: #F5F5F5;
            color: #9E9E9E;
            border: 1px solid #E0E0E0;
        }

        .status-badge i {
            font-size: 0.65rem;
        }
        /* ─────────────────────────────────────────────────── */

        .transaction-right {
            text-align: right;
            flex-shrink: 0;
        }

        .transaction-amount {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .transaction-amount.positive {
            color: #22C55E;
        }

        .transaction-amount.negative {
            color: #FF8C00;
        }

        .transaction-label {
            font-size: 0.8rem;
            color: #bbb;
            text-transform: capitalize;
        }

        .no-more {
            text-align: center;
            color: #ccc;
            padding: 20px;
            font-size: 0.9rem;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #ccc;
        }

        .empty-state i {
            font-size: 60px;
            margin-bottom: 15px;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 1rem;
        }

        .spinner-wrap {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="page-header">
        <button class="back-btn" onclick="goBack()">
            <i class="fas fa-chevron-left"></i>
        </button>
        <h1>Balance Details</h1>
    </div>

    <div class="content-wrapper">
        <div class="tabs-container">
            <ul class="nav nav-tabs" id="balanceTabs">
                <li class="nav-item">
                    <a class="nav-link active" href="#" onclick="filterTransactions('all'); return false;">All</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="filterTransactions('recharge'); return false;">Recharge</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="filterTransactions('withdrawal'); return false;">Withdrawal</a>
                </li>
            </ul>
        </div>

        <div class="transaction-list" id="transactionList">
            <!-- loaded by JS -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentFilter = 'all';

        /* ── Types that are withdrawal-related and should show a status badge ── */
        const WITHDRAWAL_TYPES = ['withdrawal'];

        /* ── Status badge config ─────────────────────────────────────────────── */
        const STATUS_CONFIG = {
            pending:    { cls: 'pending',    icon: 'fa-clock',         label: 'Pending'    },
            processing: { cls: 'processing', icon: 'fa-spinner fa-spin', label: 'Processing' },
            completed:  { cls: 'completed',  icon: 'fa-check-circle',  label: 'Approved'   },
            failed:     { cls: 'failed',     icon: 'fa-times-circle',  label: 'Failed'     },
            rejected:   { cls: 'rejected',   icon: 'fa-ban',           label: 'Rejected'   },
            cancelled:  { cls: 'cancelled',  icon: 'fa-minus-circle',  label: 'Cancelled'  },
        };

        function buildStatusBadge(status) {
            const cfg = STATUS_CONFIG[status] || STATUS_CONFIG['pending'];
            return `
                <span class="status-badge ${cfg.cls}">
                    <i class="fas ${cfg.icon}"></i> ${cfg.label}
                </span>`;
        }

        function formatAmount(amount) {
            const sign   = amount >= 0 ? '+' : '-';
            const abs    = Math.abs(amount).toLocaleString('en-UG', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
            return `${sign} UGX ${abs}`;
        }

        function humaniseType(type) {
            return type.replace(/_/g, ' ');
        }

        function humaniseBalanceType(bt) {
            return bt.replace(/_/g, ' ');
        }

        async function renderTransactions(filter = 'all') {
            const container = document.getElementById('transactionList');
            container.innerHTML = `
                <div class="spinner-wrap">
                    <i class="fas fa-spinner fa-spin fa-2x"></i>
                </div>`;

            try {
                const resp = await fetch(`/users/api/transactions/?page=1&filter=${filter}`);
                const data = await resp.json();

                if (!data.success) throw new Error('API error');

                const txns = data.transactions;

                if (!txns.length) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-receipt"></i>
                            <p>No transactions found</p>
                        </div>`;
                    return;
                }

                const rows = txns.map(t => {
                    const isWithdrawal = WITHDRAWAL_TYPES.includes(t.type);
                    const statusBadge  = isWithdrawal ? buildStatusBadge(t.status) : '';

                    return `
                        <div class="transaction-item">
                            <div class="transaction-left">
                                <div class="transaction-type">${humaniseType(t.type)}</div>
                                <div class="transaction-date">${t.created_at}</div>
                                ${statusBadge}
                            </div>
                            <div class="transaction-right">
                                <div class="transaction-amount ${t.amount >= 0 ? 'positive' : 'negative'}">
                                    ${formatAmount(t.amount)}
                                </div>
                                <div class="transaction-label">${humaniseBalanceType(t.balance_type)}</div>
                            </div>
                        </div>`;
                }).join('');

                container.innerHTML = rows + `<div class="no-more">— No more records —</div>`;

            } catch (err) {
                console.error(err);
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Error loading transactions. Please try again.</p>
                    </div>`;
            }
        }

        function filterTransactions(filter) {
            currentFilter = filter;

            /* update active tab */
            document.querySelectorAll('#balanceTabs .nav-link').forEach(el => {
                el.classList.remove('active');
                if (el.getAttribute('onclick').includes(`'${filter}'`)) {
                    el.classList.add('active');
                }
            });

            renderTransactions(filter);
        }

        function goBack() {
            window.history.back();
        }

        /* initial load */
        renderTransactions('all');
    </script>
</body>
</html>
