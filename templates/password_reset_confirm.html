{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password — Vaultrise Fund</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#f8f9fa; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
        .container { max-width:460px; margin:60px auto; padding:0 20px; }
        .logo { text-align:center; margin-bottom:28px; }
        .logo svg { width:70px; height:52px; }
        .company-name { font-size:24px; font-weight:700; letter-spacing:2px; }
        h1 { font-size:28px; font-weight:600; color:#212529; margin-bottom:8px; }
        p.sub { color:#6c757d; font-size:15px; margin-bottom:28px; }
        .form-label { font-weight:500; color:#212529; }
        .form-control { background:#f5f5f5; border:none; border-radius:10px; padding:13px 15px; font-size:15px; }
        .form-control:focus { background:#eee; box-shadow:0 0 0 0.2rem rgba(67,97,238,.15); }
        .position-relative { position:relative; }
        .password-toggle {
            position:absolute; right:14px; top:50%; transform:translateY(-50%);
            background:none; border:none; color:#6c757d; font-size:18px; cursor:pointer; z-index:10;
        }
        .strength-bar { height:5px; border-radius:4px; margin-top:8px; transition:all .3s; background:#e0e0e0; }
        .strength-bar .fill { height:100%; border-radius:4px; transition:width .3s, background .3s; width:0; }
        .strength-label { font-size:12px; margin-top:4px; }
        .btn-primary { background:#4361ee; border:none; border-radius:50px; padding:14px; font-size:17px; font-weight:600; width:100%; margin-top:20px; }
        .btn-primary:hover { background:#3651d4; }
        .req-list { list-style:none; padding:0; margin:8px 0 0; font-size:13px; }
        .req-list li { color:#6c757d; padding:2px 0; }
        .req-list li.met { color:#2e7d32; }
        .req-list li::before { content:'○ '; }
        .req-list li.met::before { content:'✓ '; }
        .alert { border-radius:10px; font-size:14px; padding:12px 16px; margin-bottom:18px; }
        .alert-danger  { background:#ffebee; color:#c62828; border-left:4px solid #c62828; border:none; }
        .alert-success { background:#e8f5e9; color:#2e7d32; border-left:4px solid #2e7d32; border:none; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
            <polygon points="50,30 100,10 100,60" fill="#FFC107"/>
            <polygon points="100,10 150,30 100,60" fill="#212529"/>
            <polygon points="50,70 100,50 100,100" fill="#FFC107"/>
            <polygon points="100,50 150,70 100,100" fill="#212529"/>
        </svg>
        <div class="company-name">VAULTRISE FUND</div>
    </div>

    <h1>Set New Password</h1>
    <p class="sub">Choose a strong password for your account.</p>

    {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}

    <form method="POST" action="{% url 'password_reset_confirm' %}" id="confirmForm">
        {% csrf_token %}

        <div class="mb-3">
            <label for="password1" class="form-label">New Password</label>
            <div class="position-relative">
                <input type="password" class="form-control" id="password1" name="password1"
                       placeholder="Enter new password" required minlength="6"
                       oninput="checkStrength(this.value); checkMatch();">
                <button type="button" class="password-toggle" onclick="togglePwd('password1', 'eye1')">
                    <span id="eye1">👁</span>
                </button>
            </div>
            <div class="strength-bar"><div class="fill" id="strengthFill"></div></div>
            <div class="strength-label" id="strengthLabel"></div>
            <ul class="req-list" id="reqList">
                <li id="req-len">At least 6 characters</li>
                <li id="req-num">Contains a number</li>
                <li id="req-upper">Contains an uppercase letter</li>
            </ul>
        </div>

        <div class="mb-3">
            <label for="password2" class="form-label">Confirm New Password</label>
            <div class="position-relative">
                <input type="password" class="form-control" id="password2" name="password2"
                       placeholder="Re-enter new password" required minlength="6"
                       oninput="checkMatch();">
                <button type="button" class="password-toggle" onclick="togglePwd('password2', 'eye2')">
                    <span id="eye2">👁</span>
                </button>
            </div>
            <div id="matchMsg" style="font-size:13px;margin-top:5px;"></div>
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">Set New Password</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePwd(id, eyeId) {
    var input = document.getElementById(id);
    var eye   = document.getElementById(eyeId);
    input.type = input.type === 'password' ? 'text' : 'password';
    eye.textContent = input.type === 'password' ? '👁' : '👁️‍🗨️';
}

function checkStrength(val) {
    var fill  = document.getElementById('strengthFill');
    var label = document.getElementById('strengthLabel');
    var score = 0;

    if (val.length >= 6)           score++;
    if (val.length >= 10)          score++;
    if (/[A-Z]/.test(val))         score++;
    if (/[0-9]/.test(val))         score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    var pct   = (score / 5) * 100;
    var color = score <= 1 ? '#e53935' : score <= 3 ? '#FF8C00' : '#2e7d32';
    var text  = score <= 1 ? 'Weak' : score <= 3 ? 'Fair' : 'Strong';

    fill.style.width      = pct + '%';
    fill.style.background = color;
    label.textContent     = text;
    label.style.color     = color;

    // Requirement checklist
    toggle('req-len',   val.length >= 6);
    toggle('req-num',   /[0-9]/.test(val));
    toggle('req-upper', /[A-Z]/.test(val));
}

function toggle(id, met) {
    document.getElementById(id).classList.toggle('met', met);
}

function checkMatch() {
    var p1  = document.getElementById('password1').value;
    var p2  = document.getElementById('password2').value;
    var msg = document.getElementById('matchMsg');
    var btn = document.getElementById('submitBtn');

    if (!p2) { msg.textContent = ''; btn.disabled = false; return; }

    if (p1 === p2) {
        msg.textContent = '✓ Passwords match';
        msg.style.color = '#2e7d32';
        btn.disabled    = false;
    } else {
        msg.textContent = '✗ Passwords do not match';
        msg.style.color = '#c62828';
        btn.disabled    = true;
    }
}
</script>
</body>
</html>
