{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — Vaultrise Fund</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#f8f9fa; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
        .container { max-width:460px; margin:60px auto; padding:0 20px; }
        .logo { text-align:center; margin-bottom:28px; }
        .logo svg { width:70px; height:52px; }
        .company-name { font-size:24px; font-weight:700; letter-spacing:2px; }
        h1 { font-size:28px; font-weight:600; color:#212529; margin-bottom:8px; }
        p.sub { color:#6c757d; font-size:15px; margin-bottom:28px; }
        .form-label { font-weight:500; color:#212529; }
        .form-control { background:#f5f5f5; border:none; border-radius:10px; padding:13px 15px; font-size:15px; }
        .form-control:focus { background:#eee; box-shadow:0 0 0 0.2rem rgba(67,97,238,.15); }
        .btn-primary { background:#4361ee; border:none; border-radius:50px; padding:14px; font-size:17px; font-weight:600; width:100%; margin-top:20px; }
        .btn-primary:hover { background:#3651d4; }
        .back-link { display:block; text-align:center; margin-top:18px; color:#6c757d; font-size:14px; }
        .back-link a { color:#4361ee; text-decoration:none; font-weight:600; }
        .alert { border-radius:10px; font-size:14px; padding:12px 16px; margin-bottom:18px; }
        .alert-danger  { background:#ffebee; color:#c62828; border-left:4px solid #c62828; border:none; }
        .alert-success { background:#e8f5e9; color:#2e7d32; border-left:4px solid #2e7d32; border:none; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
            <polygon points="50,30 100,10 100,60" fill="#FFC107"/>
            <polygon points="100,10 150,30 100,60" fill="#212529"/>
            <polygon points="50,70 100,50 100,100" fill="#FFC107"/>
            <polygon points="100,50 150,70 100,100" fill="#212529"/>
        </svg>
        <div class="company-name">VAULTRISE FUND</div>
    </div>

    <h1>Forgot Password?</h1>
    <p class="sub">Enter your registered email and we'll send you a 6-digit verification code.</p>

    {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}

    <form method="POST" action="{% url 'password_reset_request' %}">
        {% csrf_token %}
        <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" name="email"
                   placeholder="you@example.com" required autofocus
                   value="{{ request.POST.email|default:'' }}">
        </div>
        <button type="submit" class="btn btn-primary">Send Reset Code</button>
    </form>

    <div class="back-link">Remember your password? <a href="{% url 'login' %}">Sign In</a></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
