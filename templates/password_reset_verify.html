{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Code — Vaultrise Fund</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#f8f9fa; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
        .container { max-width:460px; margin:60px auto; padding:0 20px; }
        .logo { text-align:center; margin-bottom:28px; }
        .logo svg { width:70px; height:52px; }
        .company-name { font-size:24px; font-weight:700; letter-spacing:2px; }
        h1 { font-size:28px; font-weight:600; color:#212529; margin-bottom:8px; }
        p.sub { color:#6c757d; font-size:15px; margin-bottom:28px; }
        .email-badge {
            background:#e8eeff; color:#4361ee; padding:6px 14px;
            border-radius:20px; font-size:14px; font-weight:600;
            display:inline-block; margin-bottom:20px;
        }
        /* Big OTP-style inputs */
        .otp-wrapper { display:flex; gap:10px; justify-content:center; margin:24px 0; }
        .otp-wrapper input {
            width:52px; height:60px; text-align:center; font-size:24px; font-weight:700;
            border:2px solid #e0e0e0; border-radius:12px; background:#f5f5f5;
            outline:none; transition:border-color .2s;
        }
        .otp-wrapper input:focus { border-color:#4361ee; background:#fff; }
        /* hidden real input */
        #codeInput { display:none; }
        .btn-primary { background:#4361ee; border:none; border-radius:50px; padding:14px; font-size:17px; font-weight:600; width:100%; }
        .btn-primary:hover { background:#3651d4; }
        .btn-primary:disabled { background:#bbb; }
        .resend-row { text-align:center; margin-top:16px; font-size:14px; color:#6c757d; }
        .resend-row a { color:#4361ee; text-decoration:none; font-weight:600; }
        .timer { color:#e65100; font-weight:600; }
        .back-link { display:block; text-align:center; margin-top:14px; color:#6c757d; font-size:14px; }
        .back-link a { color:#4361ee; text-decoration:none; font-weight:600; }
        .alert { border-radius:10px; font-size:14px; padding:12px 16px; margin-bottom:18px; }
        .alert-danger  { background:#ffebee; color:#c62828; border-left:4px solid #c62828; border:none; }
        .alert-success { background:#e8f5e9; color:#2e7d32; border-left:4px solid #2e7d32; border:none; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
            <polygon points="50,30 100,10 100,60" fill="#FFC107"/>
            <polygon points="100,10 150,30 100,60" fill="#212529"/>
            <polygon points="50,70 100,50 100,100" fill="#FFC107"/>
            <polygon points="100,50 150,70 100,100" fill="#212529"/>
        </svg>
        <div class="company-name">VAULTRISE FUND</div>
    </div>

    <h1>Enter Verification Code</h1>
    <p class="sub">We sent a 6-digit code to:</p>
    <div class="email-badge">{{ email }}</div>

    {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}

    <form method="POST" action="{% url 'password_reset_verify' %}" id="verifyForm">
        {% csrf_token %}
        <input type="hidden" id="codeInput" name="code">

        <div class="otp-wrapper" id="otpBoxes">
            <input type="text" maxlength="1" inputmode="numeric" class="otp-box" data-index="0" autofocus>
            <input type="text" maxlength="1" inputmode="numeric" class="otp-box" data-index="1">
            <input type="text" maxlength="1" inputmode="numeric" class="otp-box" data-index="2">
            <input type="text" maxlength="1" inputmode="numeric" class="otp-box" data-index="3">
            <input type="text" maxlength="1" inputmode="numeric" class="otp-box" data-index="4">
            <input type="text" maxlength="1" inputmode="numeric" class="otp-box" data-index="5">
        </div>

        <button type="submit" class="btn btn-primary" id="verifyBtn" disabled>Verify Code</button>
    </form>

    <div class="resend-row">
        Didn't receive it?
        <span id="resendTimer">Resend in <span class="timer" id="timerCount">60</span>s</span>
        <a href="{% url 'password_reset_resend' %}" id="resendLink" style="display:none;">Resend Code</a>
    </div>

    <div class="back-link"><a href="{% url 'password_reset_request' %}">← Change email</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
var boxes = document.querySelectorAll('.otp-box');
var verifyBtn = document.getElementById('verifyBtn');

boxes.forEach(function(box, i) {
    box.addEventListener('input', function() {
        // Only allow digits
        this.value = this.value.replace(/[^\d]/g, '');
        if (this.value && i < boxes.length - 1) boxes[i + 1].focus();
        updateHidden();
    });

    box.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace' && !this.value && i > 0) {
            boxes[i - 1].focus();
            boxes[i - 1].value = '';
            updateHidden();
        }
        // Allow paste
        if (e.key === 'v' && (e.ctrlKey || e.metaKey)) return;
    });

    box.addEventListener('paste', function(e) {
        e.preventDefault();
        var pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/[^\d]/g, '');
        pasted.split('').forEach(function(ch, j) {
            if (boxes[j]) boxes[j].value = ch;
        });
        updateHidden();
        boxes[Math.min(pasted.length, boxes.length - 1)].focus();
    });
});

function updateHidden() {
    var code = Array.from(boxes).map(function(b) { return b.value; }).join('');
    document.getElementById('codeInput').value = code;
    verifyBtn.disabled = code.length !== 6;
}

// Resend countdown timer
var seconds = 60;
var timerEl = document.getElementById('timerCount');
var resendTimer = document.getElementById('resendTimer');
var resendLink  = document.getElementById('resendLink');

var countdown = setInterval(function() {
    seconds--;
    timerEl.textContent = seconds;
    if (seconds <= 0) {
        clearInterval(countdown);
        resendTimer.style.display = 'none';
        resendLink.style.display  = 'inline';
    }
}, 1000);
</script>
</body>
</html>
